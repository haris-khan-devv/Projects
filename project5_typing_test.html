<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeSpeed Pro - Typing Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 12px 30px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        .difficulty-btn:hover {
            transform: scale(1.05);
        }

        .text-display {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            font-size: 1.4em;
            line-height: 1.8;
            margin-bottom: 20px;
            min-height: 150px;
            letter-spacing: 1px;
        }

        .text-display span {
            display: inline;
        }

        .text-display .correct {
            color: #27ae60;
            background: #d5f4e6;
        }

        .text-display .incorrect {
            color: #e74c3c;
            background: #fadbd8;
        }

        .text-display .current {
            border-bottom: 3px solid #667eea;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .input-area {
            margin-bottom: 20px;
        }

        .typing-input {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
        }

        .typing-input:focus {
            border-color: #667eea;
        }

        .typing-input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .results-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .results-modal.show {
            display: flex;
        }

        .results-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .results-content h2 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .result-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .result-item .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .result-item .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .timer {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .header h1 {
                font-size: 2em;
            }
            .text-display {
                font-size: 1.1em;
                padding: 20px;
            }
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ TypeSpeed Pro</h1>
            <p>Test and improve your typing speed</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">WPM</div>
                <div class="stat-value" id="wpmDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Accuracy</div>
                <div class="stat-value" id="accuracyDisplay">100%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timeDisplay">60s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Characters</div>
                <div class="stat-value" id="charsDisplay">0</div>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
            <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="text-display" id="textDisplay"></div>

        <div class="input-area">
            <input type="text" class="typing-input" id="typingInput" 
                   placeholder="Click 'Start Test' to begin..." disabled>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startTest()">Start Test</button>
            <button class="btn btn-secondary" onclick="resetTest()">Reset</button>
        </div>
    </div>

    <div class="results-modal" id="resultsModal">
        <div class="results-content">
            <h2>🎉 Test Complete!</h2>
            <div class="results-stats">
                <div class="result-item">
                    <div class="label">Words Per Minute</div>
                    <div class="value" id="finalWpm">0</div>
                </div>
                <div class="result-item">
                    <div class="label">Accuracy</div>
                    <div class="value" id="finalAccuracy">0%</div>
                </div>
                <div class="result-item">
                    <div class="label">Characters Typed</div>
                    <div class="value" id="finalChars">0</div>
                </div>
                <div class="result-item">
                    <div class="label">Errors</div>
                    <div class="value" id="finalErrors">0</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="closeResults()">Try Again</button>
        </div>
    </div>

    <script>
        const texts = {
            easy: [
                "The quick brown fox jumps over the lazy dog.",
                "A journey of a thousand miles begins with a single step.",
                "Practice makes perfect when you try your best.",
                "Every day is a new opportunity to learn something."
            ],
            medium: [
                "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                "The only way to do great work is to love what you do and pursue excellence.",
                "Innovation distinguishes between a leader and a follower in any field.",
                "Your time is limited, so don't waste it living someone else's life."
            ],
            hard: [
                "Cryptography is the practice and study of techniques for secure communication in the presence of adversarial behavior.",
                "Quantum computing exploits quantum mechanical phenomena such as superposition and entanglement to process information.",
                "The philosophical implications of artificial intelligence raise questions about consciousness, sentience, and machine ethics.",
                "Neuroscientists study the intricate neural pathways that facilitate cognitive processes and behavioral responses."
            ]
        };

        let currentText = '';
        let currentIndex = 0;
        let startTime = null;
        let timer = null;
        let timeLeft = 60;
        let difficulty = 'easy';
        let correctChars = 0;
        let totalChars = 0;
        let errors = 0;

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetTest();
        }

        function getRandomText() {
            const textArray = texts[difficulty];
            return textArray[Math.floor(Math.random() * textArray.length)];
        }

        function displayText() {
            const display = document.getElementById('textDisplay');
            currentText = getRandomText();
            display.innerHTML = currentText.split('').map((char, index) => 
                `<span class="${index === 0 ? 'current' : ''}">${char}</span>`
            ).join('');
        }

        function startTest() {
            resetTest();
            startTime = Date.now();
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').focus();
            document.getElementById('startBtn').textContent = 'Test Running...';
            document.getElementById('startBtn').disabled = true;
            
            timer = setInterval(updateTimer, 100);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeLeft = 60 - elapsed;
            
            if (timeLeft <= 0) {
                endTest();
                return;
            }
            
            document.getElementById('timeDisplay').textContent = timeLeft + 's';
            updateProgress();
        }

        function updateProgress() {
            const progress = (currentIndex / currentText.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function calculateWPM() {
            const elapsed = (Date.now() - startTime) / 1000 / 60;
            const words = correctChars / 5;
            return Math.round(words / elapsed);
        }

        function calculateAccuracy() {
            if (totalChars === 0) return 100;
            return Math.round((correctChars / totalChars) * 100);
        }

        function updateStats() {
            if (startTime) {
                document.getElementById('wpmDisplay').textContent = calculateWPM();
                document.getElementById('accuracyDisplay').textContent = calculateAccuracy() + '%';
                document.getElementById('charsDisplay').textContent = totalChars;
            }
        }

        function endTest() {
            clearInterval(timer);
            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = 'Start Test';
            document.getElementById('startBtn').disabled = false;
            
            showResults();
        }

        function showResults() {
            document.getElementById('finalWpm').textContent = calculateWPM();
            document.getElementById('finalAccuracy').textContent = calculateAccuracy() + '%';
            document.getElementById('finalChars').textContent = totalChars;
            document.getElementById('finalErrors').textContent = errors;
            document.getElementById('resultsModal').classList.add('show');
        }

        function closeResults() {
            document.getElementById('resultsModal').classList.remove('show');
            resetTest();
        }

        function resetTest() {
            clearInterval(timer);
            currentIndex = 0;
            correctChars = 0;
            totalChars = 0;
            errors = 0;
            timeLeft = 60;
            startTime = null;
            
            document.getElementById('typingInput').value = '';
            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = 'Start Test';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('timeDisplay').textContent = '60s';
            document.getElementById('wpmDisplay').textContent = '0';
            document.getElementById('accuracyDisplay').textContent = '100%';
            document.getElementById('charsDisplay').textContent = '0';
            document.getElementById('progressBar').style.width = '0%';
            
            displayText();
        }

        document.getElementById('typingInput').addEventListener('input', function(e) {
            if (!startTime) return;
            
            const typed = e.target.value;
            const currentChar = typed[typed.length - 1];
            const expectedChar = currentText[currentIndex];
            
            if (currentChar === expectedChar) {
                correctChars++;
                const spans = document.querySelectorAll('#textDisplay span');
                spans[currentIndex].classList.remove('current');
                spans[currentIndex].classList.add('correct');
                
                currentIndex++;
                if (currentIndex < currentText.length) {
                    spans[currentIndex].classList.add('current');
                } else {
                    // Text completed, load new one
                    currentText = getRandomText();
                    displayText();
                    currentIndex = 0;
                    e.target.value = '';
                }
            } else {
                errors++;
                const spans = document.querySelectorAll('#textDisplay span');
                spans[currentIndex].classList.add('incorrect');
                setTimeout(() => {
                    spans[currentIndex].classList.remove('incorrect');
                }, 500);
            }
            
            totalChars++;
            updateStats();
            updateProgress();
        });

        // Initialize
        displayText();
    </script>
</body>
</html>
